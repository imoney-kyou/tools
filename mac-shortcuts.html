<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Mac ショートカット集</title>
<style>
  :root {
    --bg: #f5f5f7;
    --card: #ffffff;
    --text: #1d1d1f;
    --sub: #6e6e73;
    --accent: #0071e3;
    --key-bg: #e8e8ed;
    --key-border: #c7c7cc;
    --key-text: #1d1d1f;
    --divider: #e5e5ea;
    --search-bg: #e8e8ed;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #000000;
      --card: #1c1c1e;
      --text: #f5f5f7;
      --sub: #98989d;
      --accent: #2997ff;
      --key-bg: #2c2c2e;
      --key-border: #48484a;
      --key-text: #f5f5f7;
      --divider: #38383a;
      --search-bg: #1c1c1e;
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    min-height: 100vh;
  }

  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(245,245,247,0.85);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    padding: 16px 16px 0;
    border-bottom: 1px solid var(--divider);
  }
  @media (prefers-color-scheme: dark) {
    header { background: rgba(0,0,0,0.85); }
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .header-icon {
    font-size: 28px;
    line-height: 1;
  }

  h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .search-wrap {
    position: relative;
    margin-bottom: 12px;
  }

  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--sub);
    font-size: 15px;
    pointer-events: none;
  }

  #search {
    width: 100%;
    padding: 10px 16px 10px 36px;
    border: none;
    border-radius: 12px;
    background: var(--search-bg);
    color: var(--text);
    font-size: 16px;
    outline: none;
    -webkit-appearance: none;
  }

  #search::placeholder { color: var(--sub); }

  .tabs {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 12px;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 20px;
    border: none;
    background: var(--search-bg);
    color: var(--sub);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s, color 0.15s;
    -webkit-appearance: none;
  }

  .tab.active {
    background: var(--accent);
    color: #fff;
  }

  main {
    padding: 16px;
    max-width: 640px;
    margin: 0 auto;
  }

  .section { margin-bottom: 28px; }

  .section-title {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--sub);
    margin-bottom: 10px;
    padding-left: 4px;
  }

  .card {
    background: var(--card);
    border-radius: 16px;
    overflow: hidden;
  }

  .shortcut-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    gap: 12px;
    border-bottom: 1px solid var(--divider);
    transition: background 0.1s;
    cursor: default;
  }

  .shortcut-row:last-child { border-bottom: none; }
  .shortcut-row:active { background: var(--bg); }

  .shortcut-desc {
    font-size: 15px;
    font-weight: 400;
    flex: 1;
    line-height: 1.4;
  }

  .keys {
    display: flex;
    gap: 4px;
    align-items: center;
    flex-shrink: 0;
  }

  .key {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 28px;
    height: 28px;
    padding: 0 7px;
    background: var(--key-bg);
    border: 1px solid var(--key-border);
    border-radius: 7px;
    font-size: 13px;
    font-weight: 500;
    color: var(--key-text);
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    box-shadow: 0 1px 2px rgba(0,0,0,0.12);
    white-space: nowrap;
  }

  .plus {
    color: var(--sub);
    font-size: 13px;
    font-weight: 400;
  }

  .no-result {
    text-align: center;
    color: var(--sub);
    padding: 60px 20px;
    font-size: 16px;
  }

  .hidden { display: none; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <span class="header-icon">⌨️</span>
    <h1>Mac ショートカット集</h1>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="search" id="search" placeholder="ショートカットを検索..." autocomplete="off" autocorrect="off" spellcheck="false">
  </div>
  <div class="tabs" id="tabs"></div>
</header>

<main id="main"></main>

      { desc: "反転カラー", keys: ["⌘", "⌃", "⌥", "8"] },

const SYMBOL_MAP = {
  "⌘": "Command",
  "⌥": "Option",
  "⇧": "Shift",
  "⌃": "Control",
  "Space": "Space",
  "Delete": "Delete",
  "Return": "Return",
  "Tab": "Tab",
  "Esc": "Esc",
};

function renderKeys(keys) {
  return keys.map((k, i) => `<span class="key">${k}</span>`).join('');
}

function createRow(item) {
  const div = document.createElement('div');
  div.className = 'shortcut-row';
  div.innerHTML = `
    <span class="shortcut-desc">${item.desc}</span>
    <div class="keys">${renderKeys(item.keys)}</div>
  `;
  return div;
}

let currentCategory = 'すべて';

function render(query = '') {
  const main = document.getElementById('main');
  main.innerHTML = '';
  query = query.toLowerCase().trim();

  let found = 0;

  DATA.forEach(section => {
    if (currentCategory !== 'すべて' && section.category !== currentCategory) return;

    const filtered = section.items.filter(item =>
      !query ||
      item.desc.toLowerCase().includes(query) ||
      item.keys.join('').toLowerCase().includes(query)
    );

    if (filtered.length === 0) return;

    found += filtered.length;

    const sec = document.createElement('div');
    sec.className = 'section';
    sec.innerHTML = `<div class="section-title">${section.icon} ${section.category}</div>`;

    const card = document.createElement('div');
    card.className = 'card';

    filtered.forEach(item => card.appendChild(createRow(item)));
    sec.appendChild(card);
    main.appendChild(sec);
  });

  if (found === 0) {
    main.innerHTML = '<div class="no-result">「' + (query || currentCategory) + '」に一致するショートカットが見つかりません</div>';
  }
}

function buildTabs() {
  const tabs = document.getElementById('tabs');
  const categories = ['すべて', ...DATA.map(d => d.category)];

  categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (cat === 'すべて' ? ' active' : '');
    btn.textContent = cat;
    btn.addEventListener('click', () => {
      currentCategory = cat;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      render(document.getElementById('search').value);
    });
    tabs.appendChild(btn);
  });
}

document.getElementById('search').addEventListener('input', e => {
  render(e.target.value);
});

buildTabs();
render();
</script>
</body>
</html>
