<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'Hiragino Sans', 'Yu Gothic', sans-serif;
    background: #f5f0eb;
    min-height: 100vh;
  }
  .header {
    background: linear-gradient(135deg, #1a3a5c, #2d6a9f);
    color: white;
    text-align: center;
    padding: 28px 20px 20px;
  }
  .header .subtitle { font-size: 11px; letter-spacing: 2px; opacity: 0.75; margin-bottom: 6px; }

  .header .tagline { font-size: 12px; opacity: 0.8; margin-top: 6px; }
  .search-wrap { background: #fff; padding: 12px 16px; border-bottom: 1px solid #e0d8d0; }
  .search-wrap input {
    width: 100%; padding: 10px 14px; border: 1.5px solid #ddd;
    border-radius: 24px; font-size: 14px; outline: none; font-family: inherit;
  }
  .search-wrap input:focus { border-color: #2d6a9f; }
  .kana-nav {
    background: #fff; padding: 10px 12px; display: flex; flex-wrap: wrap;
    gap: 6px; border-bottom: 2px solid #e0d8d0; position: sticky; top: 0; z-index: 10;
  }
  .kana-btn {
    flex: 1; min-width: 44px; max-width: 60px; padding: 8px 4px; border: none;
    border-radius: 8px; background: #eef2f7; color: #1a3a5c; font-size: 16px;
    font-weight: 700; cursor: pointer; transition: all 0.15s; font-family: inherit;
  }
  .kana-btn:hover { background: #d0e0f0; }
  .kana-btn.active { background: #2d6a9f; color: white; box-shadow: 0 2px 8px rgba(45,106,159,0.4); }
  .kana-btn.disabled { opacity: 0.35; cursor: default; }
  .content { padding: 12px; max-width: 600px; margin: 0 auto; }
  .row-title { font-size: 13px; color: #888; font-weight: 600; letter-spacing: 1px; padding: 8px 4px 4px; }
  .term-card {
    background: white; border-radius: 12px; margin-bottom: 8px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08); overflow: hidden; transition: box-shadow 0.15s;
  }
  .term-card:active { box-shadow: 0 2px 10px rgba(45,106,159,0.2); }
  .term-header { display: flex; align-items: center; padding: 14px 16px; cursor: pointer; user-select: none; }
  .term-kana-badge {
    width: 30px; height: 30px; border-radius: 50%; background: #eef2f7; color: #2d6a9f;
    font-size: 13px; font-weight: 700; display: flex; align-items: center;
    justify-content: center; flex-shrink: 0; margin-right: 12px;
  }
  .term-name { font-size: 15px; font-weight: 700; color: #1a3a5c; flex: 1; }
  .term-yomi { font-size: 11px; color: #aaa; margin-left: 8px; }
  .term-arrow { font-size: 18px; color: #bbb; transition: transform 0.2s; flex-shrink: 0; }
  .term-card.open .term-arrow { transform: rotate(90deg); color: #2d6a9f; }
  .term-body {
    display: none; padding: 12px 16px 16px 58px;
    font-size: 14px; line-height: 1.7; color: #444; border-top: 1px solid #f0f0f0;
  }
  .term-card.open .term-body { display: block; }
  .search-result-label { font-size: 12px; color: #888; padding: 8px 4px 4px; }
  .no-result { text-align: center; padding: 40px 20px; color: #bbb; font-size: 14px; }
  .footer { text-align: center; padding: 24px; font-size: 11px; color: #bbb; }
  .count-badge {
    display: inline-block; background: #eef2f7; color: #2d6a9f;
    font-size: 11px; font-weight: 700; border-radius: 12px; padding: 2px 8px; margin-left: 8px;
  }

  <div class="subtitle">i-money</div>
  <h1>&#128214; 投資用語ハンドブック</h1>
  <div class="tagline">知りたい用語をすぐに検索できます</div>
</div>

<div class="search-wrap">
  <input type="text" id="searchInput" placeholder="&#128269; 用語を検索（例：配当、NISA…）" oninput="onSearch()">
</div>

<div class="kana-nav" id="kanaNav"></div>

<script>
const TERMS = [
  {name:'ROE',yomi:'あーるおーいー',desc:'会社が株主から集めたお金を使って、どれだけ効率よく利益を出しているかを表す数字。高いほど、少ない元手でしっかり利益を出せていると考えられる。'},
  {name:'ROA',yomi:'あーるおーえー',desc:'会社が持っているすべての資産を使って、どれだけ利益を生み出しているかを表す数字。会社全体のお金や設備をうまく使えているかを見るときに使う。'},
  {name:'IPO',yomi:'あいぴーおー',desc:'これまで上場していなかった会社が、初めて証券取引所に株を公開して売買できるようになること。新しく株式市場デビューすることを指す。'},
  {name:'アクティブファンド',yomi:'あくてぃぶふぁんど',desc:'プロが銘柄を選んで市場平均より良い成績を目指す投資信託。信託報酬が年1〜2%程度と高く、長期的にはインデックスファンドに勝てないケースが多い。'},
  {name:'アセット',yomi:'あせっと',desc:'株・債券・不動産・現金など、お金を置く場所（資産の種類）のこと。どのアセットにどれくらい分けるかをアセットアロケーションという。'},
  {name:'アセットアロケーション',yomi:'あせっとあろけーしょん',desc:'株・債券・現金など、どの資産にどれくらいお金を分けて投資するかという配分のこと。たとえば「株70%・債券20%・現金10%」のように決める。'},
  {name:'アルトコイン',yomi:'あるとこいん',desc:'ビットコイン以外の暗号資産のこと。イーサリアムをはじめ多くの種類があるが、値動きが大きく、リスクも高くなりやすい。'},
  {name:'暗号資産',yomi:'あんごうしさん',desc:'インターネット上でやり取りされるデジタルのお金の正式名称。ビットコイン（BTC）やイーサリアム（ETH）が代表例。一般的に「仮想通貨」とも呼ばれる。'},
  {name:'安全資産',yomi:'あんぜんしさん',desc:'価格の変動が比較的小さく、お金を守る役割が強い資産のこと。現金、預金、個人向け国債などが代表例としてよく挙げられる。'},
  {name:'イーサリアム',yomi:'いーさりあむ',desc:'ビットコインに次いで代表的な暗号資産の一つ。送金だけでなく、さまざまなアプリやサービスを動かす土台としても使われている。'},
  {name:'ETF(上場投資信託)',yomi:'いーてぃーえふ',desc:'証券取引所に上場し、株のようにリアルタイムで売買できる投資信託。日経平均やS&P500など特定の指数に連動するように設計されており、信託報酬が低いものが多い。'},
  {name:'EPS',yomi:'いーぴーえす',desc:'1株あたりの純利益を表す数字。純利益÷発行済み株式数で計算し、その会社が1株ごとにどれくらい利益を生んでいるかを見る。'},
  {name:'eMAXIS Slim',yomi:'いーまくしす すりむ',desc:'三菱UFJアセットマネジメントが運用する低コストインデックスファンドシリーズ。eMAXIS Slim全世界株式（オール・カントリー）の信託報酬は年0.05775%と業界最低水準で人気。'},
  {name:'1489',yomi:'いちよんはちきゅう',desc:'日経平均の中から配当利回りが高い上位50銘柄を集めたETF。年4回（2・5・8・11月）分配金が支払われる。証券コードは1489（NEXT FUNDS）。'},
  {name:'一括投資',yomi:'いっかつとうし',desc:'まとまったお金を一度にまとめて投資する方法。たとえば100万円を一度に全額投資する。積立投資と比べてタイミングリスクがある。'},
  {name:'1株あたりの配当金',yomi:'いっかぶあたりのはいとうきん',desc:'1株を持っているときに受け取れる配当金の金額。配当の水準や、会社が株主にどれくらい利益を還元しているかを見るときに使う。'},
  {name:'一般口座',yomi:'いっぱんこうざ',desc:'自分で1年間の損益を計算して確定申告する必要がある証券口座。手間がかかるため、特定口座（源泉徴収あり）の利用が一般的。'},
  {name:'iDeCo',yomi:'いでこ',desc:'個人型確定拠出年金（iDeCo）の愛称。自分でお金を積み立てて運用する老後のための節税制度。掛け金が全額所得控除になり、運用益も非課税。NISAと並ぶ代表的な節税積立制度。'},
  {name:'医療費控除',yomi:'いりょうひこうじょ',desc:'1年間に支払った医療費が一定額を超えたときに使える控除のこと。確定申告をすると、払いすぎた税金が戻ることがある。'},
  {name:'医療保険',yomi:'いりょうほけん',desc:'入院や手術をしたときの医療費負担に備える保険のこと。公的医療保険である程度カバーされるため、どこまで民間保険で備えるかは人によって変わる。'},
  {name:'インカムゲイン',yomi:'いんかむげいん',desc:'配当金や利息など、資産を持っているだけで定期的に入ってくる利益。たとえば株価3,000円の株が年90円の配当を出す場合、配当利回りは3%。'},
  {name:'インカム投資',yomi:'いんかむとうし',desc:'配当金や利息などの定期収入を主な目的にする投資。高配当株やREITなどが対象になることが多く、配当利回り3〜5%以上を目安にする場合が多い。'},
  {name:'インサイダー取引',yomi:'いんさいだーとりひき',desc:'会社の内部情報（まだ公表されていない決算や合併情報など）を知っている人が、その情報を使って株を売買する違法行為。発覚すると刑事罰の対象になる。'},
  {name:'インデックス',yomi:'いんでっくす',desc:'株式市場全体の動きを表す「平均値」のような指数。日経平均（225社）・TOPIX（約2,100社）・S&P500（500社）などが代表例。インデックスファンドはこの指数に連動するように設計された投資信託のこと。'},
  {name:'インデックス投資',yomi:'いんでっくすとうし',desc:'市場全体にまとめて投資するインデックスファンドやETFを使った投資方法。個別銘柄を選ばずに市場平均のリターンを目指す、初心者にも取り組みやすい方法。'},
  {name:'インデックスファンド',yomi:'いんでっくすふぁんど',desc:'インデックス（指数）と同じ動きを目指して作られた投資信託。信託報酬が年0.1%前後と低く、長期投資に向いている。S&P500や全世界株式に連動するものが人気。'},
  {name:'インバウンド',yomi:'いんばうんど',desc:'外国人観光客が日本でお金を使うことで生まれる経済効果。2024年の訪日外客数は過去最多水準で、観光業・小売業・交通などの業績に影響する。'},
  {name:'インフレ',yomi:'いんふれ',desc:'物の値段が上がり続け、お金の価値が下がる状態。年2%のインフレが続くと、100万円の価値が10年後には約82万円相当に下がる計算になる。'},
  {name:'インフレ率',yomi:'いんふれりつ',desc:'物価が1年間でどれくらい上がったかを示す数字（%）。日本銀行が目標にしているのは年2%。消費者物価指数（CPI）で測られることが多い。'},
  {name:'売上総利益',yomi:'うりあげそうりえき',desc:'売上高から、商品を作ったり仕入れたりするのにかかった費用を引いた利益のこと。「粗利」とも呼ばれる。'},
  {name:'売上高',yomi:'うりあげだか',desc:'企業が商品やサービスを売って得た収入の合計。会社の規模を見る基本の数字で、まだ人件費や材料費などのコストは引かれていない。'},
  {name:'運用会社',yomi:'うんようがいしゃ',desc:'投資信託などのお金を実際に運用している会社。たとえば三菱UFJアセットマネジメント（eMAXIS Slim）やブラックロック（iシェアーズ）など。'},
  {name:'営業キャッシュフロー',yomi:'えいぎょうきゃっしゅふろー',desc:'会社が本業でどれくらい現金を稼いでいるかを見る数字。プラスが大きいほど本業で稼げている証拠。財務諸表（キャッシュフロー計算書）で確認できる。'},
  {name:'営業利益',yomi:'えいぎょうりえき',desc:'会社が本業でどれくらい利益を出しているかを見る数字。売上高から製造コストと販売費・管理費を引いたもの。営業利益率10%以上は優良企業の目安の一つ。'},
  {name:'営業利益率',yomi:'えいぎょうりえきりつ',desc:'売上高に対して営業利益がどれくらいあるかを示す割合。営業利益率＝営業利益÷売上高×100で計算し、本業の収益力を判断するときに使う。'},
  {name:'HDV',yomi:'えいちでぃーぶい',desc:'財務健全な米国の高配当株を約75社前後に厳選して投資するETF（ブラックロック社）。生活必需品やエネルギーなどディフェンシブ銘柄が多い。'},
  {name:'エクイティ',yomi:'えくいてぃ',desc:'会社の自己資金（株主のお金）を表す言葉。借金を引いた後に残る純粋な会社の資産のこと。株式・純資産・自己資本とほぼ同じ意味で使われる。'},
  {name:'S&P500',yomi:'えすあんどぴーごひゃく',desc:'アメリカの主要大企業500社の株価をまとめた指数。Apple・Microsoft・Amazon・Googleなどを含み、アメリカ株式市場全体の約80%をカバーする。'},
  {name:'SCHD',yomi:'えすしーえいちでぃー',desc:'配当成長と財務健全性を重視した米国株約100社に投資するETF（チャールズ・シュワブ社）。配当利回りと成長性のバランスが特徴。'},
  {name:'SPYD',yomi:'えすぴーわいでぃー',desc:'S&P500の中から配当利回りの高い約80社に投資するETF（ステート・ストリート社）。配当利回りが高いがセクター偏りがある。'},
  {name:'FX',yomi:'えふえっくす',desc:'通貨（ドルや円）の値動きで利益をねらう投資。レバレッジをかけて少ない元手で大きな取引ができるが、損失が元手を超えることもある高リスクな取引。'},
  {name:'M&A',yomi:'えむあんどえー',desc:'企業の合併（Merger）や買収（Acquisition）のこと。規模拡大や新事業進出を目的に行われ、株価に大きく影響することがある。'},
  {name:'円高',yomi:'えんだか',desc:'外国の通貨に対して円の価値が高くなること。たとえば1ドル＝150円から1ドル＝130円になることを円高という。輸出企業には不利に働く。'},
  {name:'円安',yomi:'えんやす',desc:'外国の通貨に対して円の価値が低くなること。たとえば1ドル＝130円から1ドル＝150円になることを円安という。輸出企業に有利だが輸入品は値上がりする。'},
  {name:'追証',yomi:'おいしょう',desc:'信用取引で損失が膨らんだときに、証券会社から追加で証拠金（保証金）を入れるよう求められる状態。対応しないと強制決済される。'},
  {name:'大型株',yomi:'おおがたかぶ',desc:'時価総額が大きく、安定した経営をしている大企業の株。日本ではトヨタ・ソニー・NTTなどが代表例。値動きが比較的安定している傾向がある。'},
  {name:'オールカントリー(オルカン)',yomi:'おーるかんとりー（おるかん）',desc:'世界47カ国・約3,000社の株にまとめて投資できる投資信託。正式名称は「eMAXIS Slim全世界株式（オール・カントリー）」で、信託報酬は年0.05775%。新NISAで最も人気のある商品の一つ。'},
  {name:'オフショア',yomi:'おふしょあ',desc:'海外の金融機関や市場を利用して資産運用を行うこと。手数料が高く、詐欺まがいの商品も多い。i-moneyでは一切おすすめしていない。'},
  {name:'オプション取引',yomi:'おぷしょんとりひき',desc:'将来ある価格で売買する「権利」を取引する金融商品。仕組みが複雑でリスクも高く、初心者には不向きな投資商品。'},
  {name:'終値',yomi:'おわりね',desc:'株式市場の取引時間が終わった時点の株価。日本株は15:30（東証）に決まる。翌日の始値の参考になる価格。'},
  {name:'外貨',yomi:'がいか',desc:'外国の通貨のこと。ドル・ユーロ・ポンドなど、日本円以外のお金。外貨で投資すると為替リスク（円高で損が出る可能性）が生まれる。'},
  {name:'外国株式',yomi:'がいこくかぶしき',desc:'海外の会社の株のこと。アメリカ株（S&P500連動ETFなど）が代表例。為替の影響を受けるため、円高局面では評価額が下がることがある。'},
  {name:'外国税額控除',yomi:'がいこくぜいがくこうじょ',desc:'外国株の配当などで現地ですでに払った税金を、日本の税金から差し引いて二重課税を調整するしくみのこと。確定申告をすることで使える。'},
  {name:'買付可能額',yomi:'かいつけかのうがく',desc:'NISA口座や証券口座で、今すぐ買付に使える金額のこと。口座の残高だけでなく、NISAの年間枠や生涯枠の残りも関係してくる。'},
  {name:'買い増し',yomi:'かいまし',desc:'すでに持っている株や投資信託を追加で買うこと。株価が下がったときに買い増すと、平均の購入価格を下げられることがある。'},
  {name:'価格変動リスク',yomi:'かかくへんどうりすく',desc:'価格が上下して、持っている資産の価値が変わる可能性のこと。株式は価格変動リスクが高い一方、債券や現金は比較的低い。'},
  {name:'確定申告',yomi:'かくていしんこく',desc:'1年間の所得をまとめて、税金を申告する手続き。特定口座（源泉徴収あり）なら原則不要だが、損益通算や繰越控除を使う場合は必要。'},
  {name:'格安SIM',yomi:'かくやすしむ',desc:'大手キャリアより安くスマホを使える通信サービスのこと。月数千円単位で通信費を下げられることが多い。'},
  {name:'家計管理',yomi:'かけいかんり',desc:'毎月の収入と支出を把握して、お金の流れを管理すること。無駄を減らして、貯蓄や投資に回すための土台になる。'},
  {name:'家計簿',yomi:'かけいぼ',desc:'毎月の収入と支出を記録して見える化するもの。アプリを使うと自動で集計でき、家計管理がしやすくなる。'},
  {name:'掛け捨て',yomi:'かけすて',desc:'満期になってもお金が戻らないタイプの保険のこと。貯蓄性はないが、そのぶん保険料を抑えて保障を持ちやすい。'},
  {name:'火災保険',yomi:'かさいほけん',desc:'火事だけでなく、台風・水災・落雷などで家や家財が被害を受けたときに備える保険のこと。持ち家だけでなく、賃貸でも家財補償として入ることがある。'},
  {name:'株価',yomi:'かぶか',desc:'株式市場で売買される株の値段。需要と供給で毎日変動する。日本株は1株単位で値段がつき、100株（1単元）で売買するのが基本。'},
  {name:'株式数比例配分方式',yomi:'かぶきすうひれいはいぶんほうしき',desc:'株の配当金をNISA口座で非課税のまま受け取るために必要な受取方法のこと。この設定にしていないと、配当金に税金がかかる場合がある。'},
  {name:'株式',yomi:'かぶしき',desc:'会社が資金を集めるために発行する証書。株を持つとその会社の一部を持つことになり、配当金を受け取ったり、株主総会で議決権を行使できる。'},
  {name:'株式会社',yomi:'かぶしきがいしゃ',desc:'株式を発行してお金を集め、事業を行う会社の形態。日本の上場企業のほとんどが株式会社で、東証には約3,900社が上場している。'},
  {name:'株式分割',yomi:'かぶしきぶんかつ',desc:'1株を2株・3株などに分けて、1株あたりの値段を下げること。たとえば1株10万円→2分割で1株5万円になり、買いやすくなる。'},
  {name:'株式併合',yomi:'かぶしきへいごう',desc:'複数の株を1株にまとめること。たとえば10株→1株に併合すると、1株あたりの値段は10倍になる。株数は減る。'},
  {name:'株主総会',yomi:'かぶぬしそうかい',desc:'会社の大事な方針（役員選任・配当額など）を決めるために、株主が集まる会議。年に1回（6月が多い）開催される。'},
  {name:'株主優待',yomi:'かぶぬしゆうたい',desc:'株を一定数以上持っている人がもらえる特典。食品・割引券・ギフトカードなど多様。100株保有が条件の場合が多い。'},
  {name:'空売り',yomi:'からうり',desc:'持っていない株を先に借りて売り、あとで安く買い戻すことで利益を狙う方法のこと。株価が下がると利益が出る仕組み。'},
  {name:'借り換え',yomi:'かりかえ',desc:'今借りているローンを、より条件の良い別のローンに切り替えること。金利が下がれば、毎月の返済額や総返済額を減らせる場合がある。'},
  {name:'為替ヘッジ',yomi:'かわせへっじ',desc:'為替の値動きによる損益の影響を抑えるための対策。ヘッジコストとして年0.5〜2%程度の費用がかかる場合が多い。'},
  {name:'為替リスク',yomi:'かわせりすく',desc:'外国の資産に投資するときに生じる、為替の動きによって資産の価値が変わるリスクのこと。円高になると、円に換算した価値が下がることがある。'},
  {name:'為替レート',yomi:'かわせれーと',desc:'通貨を交換するときの比率。たとえば1ドル＝150円の場合、1万ドルを円に換算すると150万円になる。毎日変動する。'},
  {name:'元本割れ',yomi:'がんぽんわれ',desc:'投資した金額よりも、資産の価値が下がってしまうこと。たとえば100万円投資して80万円になった場合、20万円の元本割れ。'},
  {name:'基準価額',yomi:'きじゅんかがく',desc:'投資信託の1口（または1万口）あたりの値段。毎営業日1回計算・公表される。投資信託はこの価格で売買が成立する。'},
  {name:'基礎年金',yomi:'きそねんきん',desc:'国民年金の土台になる年金部分のこと。日本に住む20歳以上60歳未満の人が原則加入し、老後にもらう年金の基本になる。'},
  {name:'キャッシュ(現金)',yomi:'きゃっしゅ',desc:'証券口座に置いてある現金のこと。まだ投資に使っていないお金で、投資待機中の資金を指すことが多い。'},
  {name:'キャピタルゲイン',yomi:'きゃぴたるげいん',desc:'買ったときより高く売れたときに得られる利益。たとえば100万円で買った株を130万円で売ると、30万円のキャピタルゲイン。'},
  {name:'キャピタル投資',yomi:'きゃぴたるとうし',desc:'値上がり益（キャピタルゲイン）をねらって行う投資。成長株やグロース株への投資が代表例。'},
  {name:'旧NISA',yomi:'きゅうにーさ',desc:'2024年以前の古いNISAのしくみ。非課税で持てる期間に上限があり、2024年の新NISAに切り替わった。'},
  {name:'教育費',yomi:'きょういくひ',desc:'子どもの教育にかかるお金のこと。学校の学費だけでなく、塾代や習い事、受験費用なども含めて考える必要がある。'},
  {name:'共済',yomi:'きょうさい',desc:'加入者どうしでお金を出し合い、困った人を助け合う仕組みのこと。民間保険より掛金が安いことが多いが、保障内容は事前によく確認する必要がある。'},
  {name:'業種',yomi:'ぎょうしゅ',desc:'会社を事業内容ごとに分けたグループのこと。たとえば金融、製造、エネルギー、情報通信などがあり、似た仕事をする会社どうしでまとめられる。日本株では東証の33業種、世界ではGICSの11セクター（さらに細かく24業種など）に分けられている。'},
  {name:'金融緩和',yomi:'きんゆうかんわ',desc:'中央銀行が金利を下げたりお金の量を増やして、景気を刺激する政策。借りやすい環境になるため、株価が上がりやすい傾向がある。'},
  {name:'金利',yomi:'きんり',desc:'お金を借りたり預けたりしたときにつく利息の割合（%）。たとえば銀行の普通預金金利は年0.02〜0.1%程度、住宅ローンは年1〜2%程度。'},
  {name:'口数',yomi:'くちすう',desc:'投資信託をどれだけ持っているかを表す単位のこと。株でいう「株数」に近い考え方。'},
  {name:'クラウドファンディング',yomi:'くらうどふぁんでぃんぐ',desc:'インターネットを使って多くの人から少しずつお金を集めるしくみ。投資型・寄付型・購入型などがあり、リターンや元本保証の有無は種類によって異なる。'},
  {name:'繰り上げ返済',yomi:'くりあげへんさい',desc:'住宅ローンを予定より早く返すこと。将来払う利息を減らせるメリットがある一方で、手元の現金が減りすぎないように考える必要がある。'},
  {name:'繰越控除',yomi:'くりこしこうじょ',desc:'投資で損が出た年に、翌年以降3年間の利益と相殺して税金を安くできるしくみ。確定申告が必要。損益通算と組み合わせると節税効果が高まる。'},
  {name:'グロース株',yomi:'ぐろーすかぶ',desc:'これから大きく成長しそうな会社の株。PERが高めでも将来の成長に期待して買われる。IT・AI・バイオなどの分野に多い。'},
  {name:'グロース投資',yomi:'ぐろーすとうし',desc:'成長が期待できる会社に投資して、値上がり益をねらう投資方法。業績の伸びや将来性を重視するため、PER（株価収益率）が高い銘柄を選ぶことが多い。'},
  {name:'景気動向指数',yomi:'けいきどうこうしすう',desc:'景気が今どんな状態か、これからどう動きそうかを数字で表した経済指標。内閣府が毎月発表する。数字が上がれば景気が良くなっている、下がれば悪くなっているサインと読む。'},
  {name:'経常利益',yomi:'けいじょうりえき',desc:'会社の本業による利益に加えて、利息の受け取りや支払いなども含めた利益のこと。会社が普段の事業活動全体でどれだけもうけたかを見る数字。'},
  {name:'決算',yomi:'けっさん',desc:'会社の売上・利益などの経営結果を一定期間（四半期または1年）ごとにまとめて発表すること。決算発表は株価に大きく影響することがある。'},
  {name:'現金等',yomi:'げんきんとう',desc:'会社が保有している現金や、すぐに現金化できる資産のこと。資金に余裕があるか、支払いに対応しやすいかを見る手がかりになる。'},
  {name:'源泉徴収',yomi:'げんせんちょうしゅう',desc:'税金をあらかじめ差し引いて納めるしくみ。特定口座（源泉徴収あり）では、利益に対して自動的に20.315%の税金が引かれる。'},
  {name:'源泉徴収あり口座',yomi:'げんせんちょうしゅうありこうざ',desc:'特定口座の1つ。投資で利益が出たときに、証券会社が自動で税金を計算して納めてくれる口座のこと。手間が少なく、初心者にも使いやすい。'},
  {name:'源泉徴収なし口座',yomi:'げんせんちょうしゅうなしこうざ',desc:'特定口座の1つ。投資で利益が出たときに、税金の計算や申告を自分で行う口座のこと。確定申告が必要になるが、自分で細かく管理したい人が使うことがある。'},
  {name:'権利落ち日',yomi:'けんりおちび',desc:'配当金や株主優待をもらう権利がなくなる日。この日以降に株を買っても配当はもらえない。一般的にこの日に株価が配当分だけ下がる傾向がある。'},
  {name:'権利確定日',yomi:'けんりかくていび',desc:'配当金や株主優待をもらう権利が確定する日。この日に株を保有していることが条件。権利落ち日の2営業日前（権利付最終日）までに購入が必要。'},
  {name:'コア・サテライト戦略',yomi:'こあさてらいとせんりゃく',desc:'資産の大部分をインデックスファンドなどで安定的に運用し、一部を個別株などで積極的に運用する考え方のこと。一般的には7〜9割をコア、1〜3割をサテライトに分けて投資する。'},
  {name:'恒久化',yomi:'こうきゅうか',desc:'制度や仕組みが期間限定ではなく、これから先も続いて使えるようになったこと。新NISAでは制度が恒久化され、終了時期を気にせず使えるようになった。'},
  {name:'口座開設',yomi:'こうざかいせつ',desc:'投資を始めるために、証券口座やNISA口座を申し込んで作ること。NISA口座は1人につき1口座までしか持てない。'},
  {name:'公社債',yomi:'こうしゃさい',desc:'国（国債）や会社（社債）が発行する債券をまとめていう言葉。株より一般的に安全とされるが、会社が倒産した場合は元本が戻らないこともある。'},
  {name:'厚生年金',yomi:'こうせいねんきん',desc:'会社員や公務員が加入する公的年金のこと。国民年金に上乗せして受け取れるため、加入している人のほうが将来の年金額は多くなりやすい。'},
  {name:'光熱費',yomi:'こうねつひ',desc:'電気・ガス・水道など、生活に必要なエネルギーにかかる費用のこと。契約プランや会社の見直しで節約できる場合もある。'},
  {name:'高配当ETF',yomi:'こうはいとうえーてぃーえふ',desc:'配当利回りの高い株をまとめて持てるETFのこと。1社ずつ選ばなくても分散しながら高配当株に投資でき、VYM・HDV・SPYD・SCHDなどが代表的。'},
  {name:'高配当株',yomi:'こうはいとうかぶ',desc:'配当金を多めに出している会社の株のこと。はっきりした基準はないが、一般的には配当利回りが3〜4%以上ある株を高配当株と呼ぶことが多い。'},
  {name:'高配当株投資',yomi:'こうはいとうかぶとうし',desc:'配当利回りの高い株を長く保有して、値上がり益よりも毎年の配当金収入を重視する投資のやり方。定期的な収入を得やすい一方で、株価が下がるリスクもある。'},
  {name:'国債',yomi:'こくさい',desc:'国がお金を集めるために発行する債券。国にお金を貸すイメージ。日本の個人向け国債は元本保証で、最低金利は年0.05%が保証されている。'},
  {name:'国民年金',yomi:'こくみんねんきん',desc:'日本に住む20歳以上60歳未満の人が原則加入する公的年金のこと。自営業者やフリーランスなども加入し、老後の基礎になる年金を受け取れる。'},
  {name:'個人投資家',yomi:'こじんとうしか',desc:'機関投資家（銀行・保険会社など）ではなく、個人で投資をしている人。NISAやiDeCoの普及で日本でも増加している。'},
  {name:'個人向け国債',yomi:'こじんむけこくさい',desc:'個人が1万円から購入できる国債。元本保証で、変動金利10年・固定金利5年・固定金利3年の3種類がある。最低金利は年0.05%が保証。'},
  {name:'固定金利',yomi:'こていきんり',desc:'借入期間中、金利が変わらないタイプ。住宅ローンでは「フラット35」が代表例で、金利は年1〜2%台が目安。市場金利が上がっても影響を受けない。'},
  {name:'固定費',yomi:'こていひ',desc:'毎月必ず発生する支出のこと。家賃・通信費・保険料・サブスクなどがあり、一度見直すと継続的に節約効果が出る。'},
  {name:'固定費削減',yomi:'こていひさくげん',desc:'通信費や保険料、サブスクなどの固定費を見直して支出を減らすこと。一度見直すと毎月の支出を継続的に下げられる。'},
  {name:'コモディティ',yomi:'こもでぃてぃ',desc:'金・原油・小麦など実物商品に投資すること、またはその投資対象。株や債券とは値動きが異なるため、分散投資の手段として使われることがある。'},
  {name:'財形貯蓄',yomi:'ざいけいちょちく',desc:'会社が給料から自動で引いて積み立てる貯金のしくみ。一般財形・財形住宅・財形年金の3種類があり、財形住宅・年金は一定額まで非課税。'},
  {name:'債券',yomi:'さいけん',desc:'国や会社にお金を貸す代わりに、定期的に利息を受け取り満期に元本が戻る投資商品。株より価格変動リスクが小さいが、利回りは低めが多い。'},
  {name:'最終利回り',yomi:'さいしゅうりまわり',desc:'債券を今の価格で購入し満期まで保有したときの、年間あたりの利益率。価格・利率・満期日をもとに計算する。'},
  {name:'再投資',yomi:'さいとうし',desc:'受け取った配当金や分配金を使って、同じ投資信託や株などをもう一度買い足すこと。利益を使わず運用に回すことで、複利の効果を活かしやすくなる。'},
  {name:'財務健全性',yomi:'ざいむけんぜんせい',desc:'会社がしっかり利益を出せていて、借金に頼りすぎていないなど、お金の状態が安定しているかどうかのこと。長く投資するうえで安心できる会社かを見る重要なポイント。'},
  {name:'財務諸表',yomi:'ざいむしょひょう',desc:'会社のお金の状態をまとめた書類のこと。損益計算書、貸借対照表、キャッシュフロー計算書などをまとめて財務諸表と呼ぶ。'},
  {name:'再利用枠',yomi:'さいりようわく',desc:'NISAで保有していた資産を売ると、その売った分の枠が翌年以降にまた使えるようになる仕組みのこと。新NISAの大きな特徴の一つ。'},
  {name:'先物取引',yomi:'さきものとりひき',desc:'将来の決まった日に、あらかじめ決めた価格で売買する約束をする取引のこと。仕組みが複雑でリスクも高いため、i-moneyではおすすめしていない。'},
  {name:'指値注文',yomi:'さしねちゅうもん',desc:'「この価格以下で買う・この価格以上で売る」と自分で価格を指定して出す注文方法。希望価格で買えない可能性があるが、想定外の価格での約定を防げる。'},
  {name:'雑所得',yomi:'ざつしょとく',desc:'給料・事業所得などに当てはまらない所得の分類。仮想通貨の売却益や個人年金などが該当し、他の所得と合算して課税される（総合課税）。'},
  {name:'サブスク',yomi:'さぶすく',desc:'毎月または毎年、定額で利用できるサービスのこと。動画配信やアプリなどがあり、使っていないものは見直し対象になる。'},
  {name:'GDP',yomi:'じーでぃーぴー',desc:'国内で一定期間（通常1年）に生み出されたモノやサービスの合計金額。日本のGDPは約500兆円。成長率が高いほど景気が良いとされる。'},
  {name:'塩漬け',yomi:'しおづけ',desc:'値下がりした株を損切りせずに、長期間持ち続けている状態。含み損が膨らんだまま動けなくなるリスクがある。'},
  {name:'時価総額',yomi:'じかそうがく',desc:'株価×発行済み株式数で計算される企業の規模を表す数字。世界最大はAppleで400兆円超。日本最大はトヨタで約50兆円（時期による）。'},
  {name:'自己資本比率',yomi:'じこしほんひりつ',desc:'会社の資産のうち、借金ではなく自己資金がどれくらいかを示す割合。40〜50%以上あると財務が安定しているとされる。'},
  {name:'資産運用',yomi:'しさんうんよう',desc:'今持っているお金を、株や投資信託などに回して増やしていくこと。貯めるだけでなく、お金にも働いてもらう考え方。'},
  {name:'資産形成',yomi:'しさんけいせい',desc:'将来に向けて、計画的にお金を貯めたり増やしたりしていくこと。貯蓄だけでなく、NISAやiDeCoを使った積立投資も代表的な方法になる。'},
  {name:'資産残高',yomi:'しさんざんだか',desc:'今持っている株、投資信託、現金などを合わせた合計金額のこと。現在の資産がどれくらいあるかを見る基本になる。'},
  {name:'自社株買い',yomi:'じしゃかぶがい',desc:'会社が市場から自分の会社の株を買い戻すこと。流通する株数が減るため1株あたりの利益が上がり、株価にプラスに働くことが多い。'},
  {name:'地震保険',yomi:'じしんほけん',desc:'地震・噴火・津波で家や家財が被害を受けたときに備える保険のこと。単独では入れず、火災保険とセットで加入するのが一般的。'},
  {name:'自動車保険',yomi:'じどうしゃほけん',desc:'交通事故で相手や自分の車、けがなどの損害に備える保険のこと。法律で加入が必要な自賠責保険と、自分で入る任意保険がある。'},
  {name:'自動積立',yomi:'じどうつみたて',desc:'あらかじめ金額や買う日を設定しておくと、投資信託などを自動で定期的に買ってくれる仕組みのこと。買い忘れを防ぎながら、継続して積立投資しやすくなる。毎月積立が一般的。'},
  {name:'四半期決算',yomi:'しはんきけっさん',desc:'3か月ごとに発表される会社の業績報告のこと。上場企業は年4回、売上や利益などを公表している。'},
  {name:'死亡保険',yomi:'しぼうほけん',desc:'亡くなったときに保険金が支払われる保険のこと。一定期間だけ保障する「定期保険」と、一生涯保障が続く「終身保険」が代表的。'},
  {name:'社債',yomi:'しゃさい',desc:'会社がお金を集めるために発行する債券のこと。買った人は、定期的に利息を受け取り、満期になると元本が返される。'},
  {name:'終身保険',yomi:'しゅうしんほけん',desc:'一生涯保障が続く生命保険のこと。途中で保障が切れない安心感はあるが、定期保険に比べると保険料は高くなりやすい。'},
  {name:'住宅ローン',yomi:'じゅうたくろーん',desc:'家を買うために銀行などから借りるお金のこと。返済は長期間にわたることが多く、金利や毎月の返済額をよく確認して組むことが大切。'},
  {name:'住宅ローン控除',yomi:'じゅうたくろーんこうじょ',desc:'住宅ローンを組んで家を買った人が使える税の優遇制度のこと。年末時点のローン残高に応じて、所得税や住民税の負担が軽くなる。'},
  {name:'収入保障保険',yomi:'しゅうにゅうほしょうほけん',desc:'亡くなったときに、家族が毎月一定額を受け取れるタイプの生命保険のこと。必要な保障を持ちやすく、保険料も比較的抑えやすい。'},
  {name:'住民税',yomi:'じゅうみんぜい',desc:'住んでいる都道府県や市区町村に納める税金のことで一律約10％。投資の利益にかかる税金では、20.315％のうちの5％分が住民税にあたる。'},
  {name:'ジュニアNISA',yomi:'じゅにあにーさ',desc:'2023年末で廃止された子ども向けのNISA制度のこと。0歳〜19歳を対象に、年80万円まで非課税で投資できた。2024年以降は新規口座開設はできないが、2023年末時点の残高は非課税のまま保有できる。'},
  {name:'純資産総額',yomi:'じゅんしさんそうがく',desc:'投資信託に集まっているお金の合計のこと。大きいほど、多くの人に買われているファンドの目安になる。'},
  {name:'純利益',yomi:'じゅんりえき',desc:'会社の利益から税金や特別損益を引いた、最終的な利益。株主に帰属する利益で、EPS（1株利益）の計算に使われる。'},
  {name:'生涯投資枠',yomi:'しょうがいとうしわく',desc:'NISAで一生のうちに使える非課税投資の上限額のこと。新NISAでは合計1,800万円まで使える。'},
  {name:'少額投資非課税制度',yomi:'しょうがくとうしひかぜいせいど',desc:'NISAの正式名称のこと。少額から投資を始めても、売却益や配当金などの利益に税金がかからない仕組みを指す。'},
  {name:'証券会社',yomi:'しょうけんがいしゃ',desc:'株や債券、投資信託などの金融商品を売買するときに仲介をする会社のこと。SBI証券、楽天証券、野村証券などがある。'},
  {name:'証券口座',yomi:'しょうけんこうざ',desc:'株や投資信託などの金融商品を売買するために、証券会社で開設する口座のこと。'},
  {name:'上場',yomi:'じょうじょう',desc:'株を証券取引所で誰でも売買できるようにすること。東証への上場審査を通過する必要があり、日本では約3,900社が上場している。'},
  {name:'上場投資信託（ETF）',yomi:'じょうじょうとうししんたく',desc:'証券取引所に上場していて、株のようにリアルタイムで売買できる投資信託。信託報酬が低く、インデックスファンドとともに長期投資に適している。'},
  {name:'消費者物価指数',yomi:'しょうひしゃぶっかしすう',desc:'日常生活で買う食品・光熱費・家賃などの物価がどれくらい上がっているかを表した数字。総務省が毎月発表し、インフレ率の指標として使われる。'},
  {name:'所得控除',yomi:'しょとくこうじょ',desc:'税金を計算するときに、所得から差し引けるもののこと。控除が多いほど税金の対象になる金額が小さくなり、結果として税負担も軽くなる。'},
  {name:'所得税',yomi:'しょとくぜい',desc:'1年間で得た所得に対してかかる税金のこと。給料や事業収入だけでなく、投資の利益にもかかり、上場株や投資信託の利益には通常20.315％（所得税15.315％・住民税5％）がかかる。'},
  {name:'新興国株式',yomi:'しんこうこくかぶしき',desc:'インドやブラジル、インドネシアなど、これから人口増加や経済成長が期待される国の会社の株に投資すること。大きく成長する可能性がある一方で、値動きが大きく、政治や通貨の影響も受けやすい。'},
  {name:'申告分離課税',yomi:'しんこくぶんりかぜい',desc:'投資で得た利益に対して使われる税金のしくみのこと。給与などほかの所得とは分けて計算し、税率は20.315％（所得税15.315％、住民税5％）がかかる。'},
  {name:'信託報酬',yomi:'しんたくほうしゅう',desc:'投資信託を保有している間、毎日少しずつ引かれる運用の手数料。年0.05〜0.2%のインデックスファンドから、年1〜2%のアクティブファンドまで様々。低いほど投資家に有利。'},
  {name:'新NISA',yomi:'しんにーさ',desc:'2024年から始まった、新しいNISA制度のこと。（NISA＝税金がかからない口座）旧つみたてNISAと旧一般NISAが統合され、つみたて投資枠と成長投資枠の2つの投資枠が使えるようにパワーアップ。一生涯で1800万円の非課税枠があり、無期限で非課税の恩恵が受けられる。'},
  {name:'信用取引',yomi:'しんようとりひき',desc:'証券会社からお金や株を借りて行う取引のこと。手元の資金より大きい金額で取引できるが、損失も大きくなりやすい。追証（追加証拠金）が発生する場合もあり、i-moneyではおすすめしていない。'},
  {name:'信用リスク',yomi:'しんようりすく',desc:'投資先の会社や国がお金を返せなくなって、元本や利息が受け取れなくなるリスクのこと。'},
  {name:'スイッチング',yomi:'すいっちんぐ',desc:'同じ証券会社や保険会社の中で、持っている投資信託を別のファンドに乗り換えること。'},
  {name:'スイングトレード',yomi:'すいんぐとれーど',desc:'数日〜数週間の期間で売買を繰り返す短期投資。デイトレードより長く、長期投資より短い取引スタイル。テクニカル分析を使うことが多い。'},
  {name:'スクリーニング',yomi:'すくりーにんぐ',desc:'条件を決めて、投資候補をふるいにかけて絞り込む作業のこと。たとえば配当利回りや時価総額などで条件を設定して探す。'},
  {name:'ストップ高',yomi:'すとっぷだか',desc:'1日の値上がりの上限（前日比30〜50%程度が目安）まで株価が上がり、それ以上取引できなくなる状態。好材料の発表後などに起こりやすい。'},
  {name:'ストップ安',yomi:'すとっぷやす',desc:'1日の値下がりの下限まで株価が下がり、それ以上取引できなくなる状態。悪材料の発表後に起こりやすく、売りたくても売れない状況になる。'},
  {name:'スポット購入',yomi:'すぽっとこうにゅう',desc:'投資信託や株などを、積立ではなく、その都度好きなタイミングで買う方法のこと。たとえば10万円分を一回でまとめて買う買い方がこれにあたる。新NISAでは、つみたて投資枠では使えず、成長投資枠で使える買い方である。'},
  {name:'生活防衛費',yomi:'せいかつぼうえいひ',desc:'失業や病気などの緊急時に備えて、すぐ使える状態で置いておく現金のこと。生活費の3〜6ヶ月分を目安に準備するのが一般的。'},
  {name:'政策金利',yomi:'せいさくきんり',desc:'中央銀行が、景気や物価を調整するために決める金利のこと。金利が上がるとお金を借りにくくなり、下がるとお金を借りやすくなる。'},
  {name:'成長投資枠',yomi:'せいちょうとうしわく',desc:'新NISAの投資枠の一つ。年間240万円まで利用でき、上場株式・投資信託・ETFなど幅広い商品に投資できる。つみたて投資枠（年120万円）と合わせて年最大360万円まで非課税で運用できる。'},
  {name:'生命保険',yomi:'せいめいほけん',desc:'亡くなったときや重い障害を負ったときに、家族に保険金が支払われる保険。家族の生活を守る目的で加入することが多い。'},
  {name:'生命保険料控除',yomi:'せいめいほけんりょうこうじょ',desc:'支払った生命保険や医療保険などの保険料の一部を、税金の計算から差し引ける制度のこと。年末調整や確定申告で手続きする。'},
  {name:'セキュリティキー',yomi:'せきゅりてぃきー',desc:'USB型の機器や専用デバイスを使って本人確認をする仕組みのこと。ネット銀行や証券口座のログインをより安全にするために使われる。'},
  {name:'セクター',yomi:'せくたー',desc:'同じ業種の会社をまとめたグループ。情報技術・ヘルスケア・金融・エネルギーなど11〜13のセクターに分けられることが多い。'},
  {name:'セクター分散',yomi:'せくたーぶんさん',desc:'IT・金融・エネルギー・医療など、違う業種に分けて投資すること。1つの業種だけに偏らないことで、値動きのかたよりを抑えやすくなる。'},
  {name:'節税',yomi:'せつぜい',desc:'法律のルールの中で、使える制度を活用して税金を減らすこと。NISAやiDeCo、ふるさと納税などが代表的な方法としてよく使われる。'},
  {name:'セルフメディケーション税制',yomi:'せるふめでぃけーしょんぜいせい',desc:'一定の条件を満たした市販薬の購入費について、税金を軽くできる制度のこと。健康診断などを受けていることが条件で、確定申告が必要になる。'},
  {name:'先進国株式',yomi:'せんしんこくかぶしき',desc:'日本やアメリカ、ヨーロッパなど、すでに経済が大きく成長していて、企業や市場の仕組みが比較的安定している国の会社の株に投資すること。値動きは比較的安定しやすいが、大きな成長は新興国より小さいことが多い。'},
  {name:'全世界株式',yomi:'ぜんせかいかぶしき',desc:'日本を含む世界中の会社の株にまとめて投資できる商品や考え方のこと。1つの商品で多くの国や企業に分散できるため、オールカントリー（オルカン）などがよく使われる。'},
  {name:'総合課税',yomi:'そうごうかぜい',desc:'給与や事業収入など、いろいろな所得を合計して税率を決めるしくみのこと。所得が増えるほど税率も上がり、所得税は5％〜45％の範囲で課税される。'},
  {name:'相場',yomi:'そうば',desc:'株や為替などの市場全体の値動きや状況を指す言葉。「相場が強い（上昇）」「相場が崩れた（急落）」などの使い方をする。'},
  {name:'増配',yomi:'ぞうはい',desc:'会社が配当金を以前より増やすこと。たとえば1株あたりの配当が年50円から年60円に増えること。株主還元の積極的な姿勢を示すシグナルとなる。'},
  {name:'増配率',yomi:'ぞうはいりつ',desc:'配当金が前年と比べてどれくらい増えたかを表す割合のこと。たとえば昨年100円、今年110円なら、増配率は10%になる。'},
  {name:'ソーシャルレンディング',yomi:'そーしゃるれんでぃんぐ',desc:'インターネットを通じて企業などにお金を貸し、利息を受け取る投資サービスのこと。元本保証はなく、貸し倒れなどで損をする可能性もあるため注意が必要。'},
  {name:'底値',yomi:'そこね',desc:'株価が下がり続けたあとにつける一番安い価格。どこが底値かは後からしか分からないため、「底値で買う」ことは非常に難しい。'},
  {name:'損益計算書',yomi:'そんえきけいさんしょ',desc:'会社の一定期間の売上・費用・利益をまとめた書類のこと。会社がどれだけ利益を出したかを見るときに使う。'},
  {name:'損益通算',yomi:'そんえきつうさん',desc:'同じ年に出た複数の投資の利益と損失を合算して税金を安くするしくみ。たとえば30万円の利益と20万円の損失があれば、課税対象は10万円になる。'},
  {name:'損切り',yomi:'そんぎり',desc:'損失が大きくなる前に株などを売って損失を確定させること。たとえば「10%下がったら売る」と事前にルールを決めて実行する。'},
  {name:'貸借対照表',yomi:'たいしゃくたいしょうひょう',desc:'会社の資産・負債・純資産をまとめた財務諸表。「バランスシート（BS）」とも呼ぶ。会社の財務の安定性（借金の多さなど）を確認できる。'},
  {name:'退職金',yomi:'たいしょくきん',desc:'会社を辞めるときに会社から支払われるお金のこと。ある会社とない会社があり、金額も勤続年数や会社の制度によって大きく変わる。'},
  {name:'高値掴み',yomi:'たかねづかみ',desc:'株価が高い時期に買ってしまい、その後株価が下がってしまうこと。定期的な積立投資で買う価格を分散させることで、高値掴みのリスクを抑えられる。'},
  {name:'タコ足配当',yomi:'たこあしはいとう',desc:'投資信託の利益ではなく、自分が出したお金（元本）から分配金を配っている状態。見た目より実は資産が減っている。'},
  {name:'単元株',yomi:'たんげんかぶ',desc:'株を売買するときの基本単位。日本株の多くは100株が1単元で、単元まとめて購入するのが基本。1単元に満たない株は「単元未満株」という。'},
  {name:'単元未満株',yomi:'たんげんみまんかぶ',desc:'1株など単元に満たない株数でも売買できるサービス。SBI証券の「S株」や楽天証券の「かぶミニ」などがある。少額で個別株を試せる。'},
  {name:'単利',yomi:'たんり',desc:'最初に預けた元本だけに対して利息がつく計算方法のこと。利益を元本に組み入れる複利と比べると、増え方はゆるやかになる。'},
  {name:'中間配当',yomi:'ちゅうかんはいとう',desc:'企業が1年の途中（6月末や9月末）で株主に支払う配当金。年2回（中間配当＋期末配当）に分けて支払う会社が多い。'},
  {name:'長期・積立・分散',yomi:'ちょうき・つみたて・ぶんさん',desc:'投資の基本とされる考え方のこと。長い期間続けて、定期的に積み立て、いろいろな資産や地域に分けることで、リスクを抑えながら資産を育てやすくなる。'},
  {name:'長期投資',yomi:'ちょうきとうし',desc:'数年〜数十年の長い期間にわたって資産を運用する投資スタイル。NISAやiDeCoと組み合わせ、インデックスファンドをコツコツ積み立てる方法が代表的。'},
  {name:'長期保有',yomi:'ちょうきほゆう',desc:'株や投資信託を短期間で売らずに、数年〜数十年単位で持ち続けること。時間をかけることで複利の効果を活かしやすくなる。'},
  {name:'直接利回り',yomi:'ちょくせつりまわり',desc:'投資額に対して1年間で受け取れる利息や配当の割合。たとえば1株3,000円の株が年90円の配当なら、直接利回りは3%。'},
  {name:'通信費',yomi:'つうしんひ',desc:'スマホやインターネットにかかる費用のこと。見直すことで家計改善の効果が大きい項目の一つ。'},
  {name:'積立設定',yomi:'つみたてせってい',desc:'毎月や毎日など、決めたタイミングと金額で自動的に投資信託などを買う設定のこと。一度設定すると、買い忘れを防ぎながら積立を続けやすい。'},
  {name:'積立投資',yomi:'つみたてとうし',desc:'毎月など定期的に一定金額を投資し続ける方法のこと。価格が高いときは少なく・安いときは多く買えるため、平均購入単価を抑えやすい（ドルコスト平均法）。NISAのつみたて投資枠と組み合わせるのが代表的な使い方。'},
  {name:'つみたて投資枠',yomi:'つみたてとうしわく',desc:'新NISAの投資枠の一つ。年間120万円まで積立投資に使え、金融庁が認定した低コストの投資信託・ETFが対象。成長投資枠と合わせて年最大360万円まで非課税で投資できる。'},
  {name:'つみたてNISA',yomi:'つみたてにーさ',desc:'旧NISAの1つ。年40万円まで最長20年間の非課税積立投資ができたしくみ。2024年以降は新NISAのつみたて投資枠（年120万円）に移行した。'},
  {name:'定額取り崩し',yomi:'ていがくとりくずし',desc:'毎月・毎年あらかじめ決めた金額を取り崩す方法。生活費を一定にしやすいが、資産の減り方には注意が必要。'},
  {name:'定期保険',yomi:'ていきほけん',desc:'10年や20年など、一定期間だけ保障が続く生命保険のこと。必要な期間にしぼって大きな保障を持ちやすく、保険料も比較的安い。'},
  {name:'ティッカー',yomi:'てぃっかー',desc:'米国株を識別するためのアルファベットの略称コード。Apple＝AAPL、Google＝GOOGL、Amazon＝AMZN、Microsoft＝MSFTなど。日本株は4桁の数字コードで管理される。'},
  {name:'ディフェンシブ株',yomi:'でぃふぇんしぶかぶ',desc:'景気の影響を受けにくい安定した業種の会社の株。食品（日清食品）・医薬品（武田薬品）・電力・通信（NTT）などが代表例。景気が悪くても需要が落ちにくく、景気敏感株の反対に位置づけられる。'},
  {name:'定率取り崩し',yomi:'ていりつとりくずし',desc:'毎年「今ある資産の◯%」という割合で取り崩していく方法。資産額に応じて取り崩し額が変わるため、長くお金が持ちやすい特徴がある。'},
  {name:'出来高',yomi:'できだか',desc:'一定期間にどれくらいの株が売買されたかを表す数量。出来高が多いほど取引が活発で、流動性が高い（売買しやすい）ことを示す。'},
  {name:'出口戦略',yomi:'でぐちせんりゃく',desc:'投資で増やした資産を、いつ・どのタイミングで・どのように使うかを考える計画のこと。増やすだけでなく、どう使うかまで含めて考えるのが大切。'},
  {name:'テクニカル指標',yomi:'てくにかるしひょう',desc:'株価の過去の動きやチャートをもとに売買タイミングを探るための指標。移動平均線・RSI・MACDなどがある。ファンダメンタル分析と組み合わせて使われることも多い。'},
  {name:'手取り',yomi:'てどり',desc:'給料から税金や社会保険料が引かれたあとに、実際に自分の手元に入るお金のこと。使える金額のベースになる。'},
  {name:'デフレ',yomi:'でふれ',desc:'物価が下がり続け、企業の収益が落ち経済が停滞する状態。1990年代以降の日本が長年デフレに苦しんだ。インフレの反対。'},
  {name:'投機',yomi:'とうき',desc:'短期間で大きな利益を狙う売買。価格変動リスクを積極的に取る行為で、FX・先物・仮想通貨などが代表例。「投資」とは目的・期間が異なる。'},
  {name:'東京証券取引所',yomi:'とうきょうしょうけんとりひきじょ',desc:'日本の株式市場を運営している取引所。プライム・スタンダード・グロースの3市場があり、約3,900社が上場している。略称は「東証」。'},
  {name:'投資',yomi:'とうし',desc:'将来お金を増やすことを目的に、株・債券・不動産などにお金を使うこと。長期・分散・積立が基本原則とされる。'},
  {name:'投資詐欺',yomi:'とうしさぎ',desc:'投資を口実にしてお金をだまし取る詐欺のこと。絶対に儲かる、元本保証、高利回りをうたう話は特に注意が必要。'},
  {name:'投資信託',yomi:'とうししんたく',desc:'多くの人のお金を集めて、株や債券などにまとめて投資する金融商品。ETFと違い1日1回計算される基準価額で売買し、証券取引所に上場していない。自動積立がしやすく、100円から購入できるものも多い。'},
  {name:'トータルリターン',yomi:'とーたるりたーん',desc:'投資で得た値上がり益（キャピタルゲイン）と配当・分配金（インカムゲイン）を合算した全体の収益。投資成績を見るときに使う指標。'},
  {name:'特定口座',yomi:'とくていこうざ',desc:'証券会社が税金の計算や納税を代わりに行ってくれる口座。「源泉徴収あり」を選べば確定申告不要（自動で20.315%が引かれる）。'},
  {name:'TOPIX',yomi:'とぴっくす',desc:'東証プライム・スタンダード・グロース市場に上場している約2,100社以上の株価をもとにした日本の代表的な株価指数。日経平均（225社）より多くの会社をカバーしている。'},
  {name:'トラッキングエラー',yomi:'とらっきんぐえらー',desc:'投資信託の値動きが、目標とする指数（インデックス）からどれだけズレているかを示す数値。数値が小さいほど指数に忠実に連動している。'},
  {name:'取り崩し',yomi:'とりくずし',desc:'積み立ててきた資産を少しずつ売却して、生活費などに使っていくこと。老後の資産活用で重要になる考え方。'},
  {name:'ドルコスト平均法',yomi:'どるこすとへいきんほう',desc:'毎月一定の金額を定期的に投資する方法。価格が安いときは多く買え、高いときは少なく買えるため、平均購入単価を自然に抑えられる効果がある。'},
  {name:'ドローダウン',yomi:'どろーだうん',desc:'資産が最高値から現在までにどれくらい下がったかを示す数値（%）。最大ドローダウンが大きいほど、過去の最大損失が大きかったことを意味する。'},
  {name:'NASDAQ総合指数',yomi:'なすだっくそうごうしすう',desc:'アメリカのNASDAQ市場に上場している約3,000社以上の株価をまとめた指数。Apple・Amazon・Metaなどのハイテク・IT企業が多いのが特徴。'},
  {name:'72の法則',yomi:'ななじゅうにのほうそく',desc:'お金が約2倍になるまでの年数を簡単に計算する方法。72÷金利（%）＝目安の年数。たとえば年利7%なら72÷7≒10年で2倍になる計算。'},
  {name:'成行注文',yomi:'なりゆきちゅうもん',desc:'価格を指定せず、そのとき市場でついている値段ですぐに売買する注文方法。確実に売買できるが、急変動時に想定外の価格で約定するリスクがある。'},
  {name:'ナンピン',yomi:'なんぴん',desc:'株価が下がったときに、同じ株をさらに買い足して平均購入単価を下げる方法。さらに下がると損失が拡大するリスクがあるため、慎重な判断が必要。'},
  {name:'NISA',yomi:'にーさ',desc:'投資で得た利益（売却益・配当金）に税金がかからないしくみ。新NISAは年間最大360万円（つみたて投資枠120万円＋成長投資枠240万円）、生涯で1,800万円まで非課税で投資できる。2024年から恒久化・無期限化された。'},
  {name:'NISA口座',yomi:'にーさこうざ',desc:'NISAを使って投資するための専用口座のこと。証券会社や銀行で作ることができ、口座の中で出た利益や配当金には税金がかからない。'},
  {name:'NISAの出口戦略',yomi:'にーさのでぐちせんりゃく',desc:'NISAで増やした資産を、老後などに向けてどう取り崩していくかを考える計画のこと。定率で取り崩すか、定額で使うかなどを事前に決めておく。'},
  {name:'二段階認証',yomi:'にだんかいにんしょう',desc:'ログインするときに、パスワードだけでなく、SMSの番号や認証アプリのコードなどでも確認する仕組みのこと。不正ログインを防ぐうえでとても重要。'},
  {name:'日銀金融政策決定会合',yomi:'にちぎんきんゆうせいさくけっていかいごう',desc:'日本銀行の政策委員会が集まって、政策金利などを決める会議。年8回開催され、その結果が市場に大きな影響を与える。'},
  {name:'日経平均株価',yomi:'にっけいへいきんかぶか',desc:'東証プライム市場に上場している主要225社の株価から計算した日本の代表的な株価指数。日経225とも呼ばれ、毎朝・毎夕の指数を確認するのが投資の基本。'},
  {name:'日本株',yomi:'にほんかぶ',desc:'東京証券取引所など、日本の取引所に上場している会社の株のこと。トヨタや三菱UFJなど身近な企業にも投資しやすく、日経平均やTOPIXが全体の動きを見る目安になる。'},
  {name:'日本銀行',yomi:'にほんぎんこう',desc:'日本のお金の流れ・金利・通貨量をコントロールする中央銀行。日銀が金利を上げると預金・ローン金利が上がり、株式市場に影響することが多い。'},
  {name:'入金力',yomi:'にゅうきんりょく',desc:'毎月どれくらい投資に回せるかという力のこと。投資では利回りだけでなく、どれだけ継続して入金できるかも結果に大きく影響する。'},
  {name:'ニューヨーク・ダウ',yomi:'にゅーよーくだう',desc:'アメリカの代表的な大企業30社（Apple・Goldman Sachsなど）の株価平均値。ダウ平均・NYダウとも呼ばれ、アメリカの景気動向を見る指標として世界中で注目される。'},
  {name:'年間投資枠',yomi:'ねんかんとうしわく',desc:'NISAで1年間に投資できる金額の上限のこと。新NISAでは、つみたて投資枠と成長投資枠を合わせて年間360万円まで使える。'},
  {name:'年金',yomi:'ねんきん',desc:'老後や障害がある状態になったときなどに、国から定期的に受け取れるお金の仕組みのこと。老後の生活を支える土台になるお金として考えられている。'},
  {name:'年金受給',yomi:'ねんきんじゅきゅう',desc:'老齢年金を実際に受け取り始めること。通常は65歳からだが、早めたり遅らせたりすることで受け取る金額が変わる仕組みがある。'},
  {name:'年初来高値',yomi:'ねんしょらいたかね',desc:'その年の1月から今日までの間で、一番高かった株価。年初来高値を更新し続ける銘柄は強いトレンドにあるとされる。'},
  {name:'年末調整',yomi:'ねんまつちょうせい',desc:'会社員が年末に、1年間の税金を会社経由で計算し直す手続きのこと。保険料控除などを反映して、払いすぎた税金が戻ることもある。'},
  {name:'ノーロード',yomi:'のーろーど',desc:'購入するときの手数料（販売手数料）がゼロの投資信託。現在はネット証券を中心にノーロードの商品が主流になっている。'},
  {name:'ハイテク株',yomi:'はいてくかぶ',desc:'IT・AI・半導体など最先端技術を扱う会社の株。NASDAQ市場に多く、Apple・Nvidia・TSMCなどが代表例。成長期待が高い反面、金利上昇時に下がりやすい傾向がある。'},
  {name:'配当落ち',yomi:'はいとうおち',desc:'権利落ち日に配当金相当分だけ株価が下がること。たとえば年100円の配当がある株は権利落ち日に理論上100円分下落する。'},
  {name:'配当金',yomi:'はいとうきん',desc:'会社が利益の一部を株主に分けて支払うお金。3月・9月決算の会社は年2回（中間・期末）に支払われることが多い。100株保有で年5,000円など、持ち株数に応じてもらえる。'},
  {name:'配当再投資',yomi:'はいとうさいとうし',desc:'受け取った配当金をそのまま使わず、もう一度同じ投資信託や株を買い足すこと。複利効果で長期的に資産が大きく増える。新NISAでは分配金の再投資も非課税で行える。'},
  {name:'配当所得',yomi:'はいとうしょとく',desc:'配当金として受け取った利益の所得区分。上場株式の配当は申告分離課税を選ぶと一律20.315%の課税、または確定申告なしで源泉徴収で完結できる。'},
  {name:'配当性向',yomi:'はいとうせいこう',desc:'会社の純利益のうち、どれくらいを配当金として株主に配っているかの割合。配当性向＝配当総額÷純利益×100。30〜50%が一般的な水準とされる。'},
  {name:'配当利回り',yomi:'はいとうりまわり',desc:'株価に対して1年間でもらえる配当金の割合。計算式：年間配当金÷株価×100。一般的に3%以上を高配当と呼ぶことが多く、日本高配当株の平均は3〜4%程度。'},
  {name:'バイナリーオプション',yomi:'ばいなりーおぷしょん',desc:'価格が上がるか下がるかを予想して行う取引。仕組みが単純に見えるが胴元優位の確率設定になっており、長期的に勝ち続けることは極めて難しい。i-moneyではおすすめしない。'},
  {name:'始値',yomi:'はじめね',desc:'その日の株式市場で最初についた株価。東証では9:00に寄り付きとして始値が決まる。前日の終値と比べて上か下かで、当日の相場の出発点がわかる。'},
  {name:'パスキー',yomi:'ぱすきー',desc:'パスワードの代わりに、指紋認証や顔認証、端末の本人確認を使ってログインする仕組みのこと。フィッシング詐欺に強く、より安全に使いやすい。'},
  {name:'バブル経済',yomi:'ばぶるけいざい',desc:'株や不動産の価格が実際の価値をはるかに超えて膨らむ状態。日本では1980年代後半がバブル期で、日経平均は1989年末に史上最高値38,915円をつけた。'},
  {name:'バリュー株',yomi:'ばりゅーかぶ',desc:'会社の本来の価値（PBR1倍未満・PER低めなど）に比べて株価が割安とされる株。成熟した大企業に多く、長期的に安定したリターンが期待される。'},
  {name:'バリュー投資',yomi:'ばりゅーとうし',desc:'割安だと考えられる株を見つけて投資する方法。PER・PBR・配当利回りなどの指標で割安度を判断する。ウォーレン・バフェットが代表的な実践者。'},
  {name:'販売会社',yomi:'はんばいがいしゃ',desc:'投資信託などを投資家に販売している金融機関。楽天証券・SBI証券・マネックス証券などのネット証券や、銀行・郵便局も販売会社にあたる。'},
  {name:'販売手数料',yomi:'はんばいてすうりょう',desc:'投資信託を買うときにかかる手数料のこと。「ノーロード」は、この手数料がかからない投資信託を指す。'},
  {name:'PER',yomi:'ぴーいーあーる',desc:'株価が1株あたり利益の何倍かを示す指標。PER＝株価÷EPS。高いほど成長期待、低いほど割安と見られることが多い。'},
  {name:'PBR',yomi:'ぴーびーあーる',desc:'株価が1株あたり純資産の何倍かを示す指標。PBR＝株価÷BPS。1倍前後や1倍未満は割安の目安として使われることがある。'},
  {name:'BPS',yomi:'びーぴーえす',desc:'1株あたりの純資産を表す数字。会社の資産から負債を引いた残りを株数で割ったもので、会社の持っている価値を1株ごとに見た目安になる。'},
  {name:'非課税期間',yomi:'ひかぜいきかん',desc:'投資で出た利益に税金がかからない期間のこと。旧NISAでは年数に制限があったが、新NISAでは無期限になった。'},
  {name:'非課税制度',yomi:'ひかぜいせいど',desc:'投資で得た利益に税金がかからない仕組みのこと。NISAやiDeCoなど、税の優遇を受けながら資産づくりができる制度がこれにあたる。'},
  {name:'非課税保有',yomi:'ひかぜいほゆう',desc:'NISAの枠を使って保有している資産のこと。NISA口座の中で持っている間は、売却益や配当金に税金がかからない。'},
  {name:'非課税保有限度額',yomi:'ひかぜいほゆうげんどがく',desc:'NISAで税金がかからないまま持てる資産の上限額のこと。新NISAでは最大1,800万円までが対象になる。'},
  {name:'非上場株式',yomi:'ひじょうじょうかぶしき',desc:'証券取引所に上場していない会社の株式。市場で自由に売買しにくく、価格も分かりにくいことが多い。'},
  {name:'ビットコイン',yomi:'びっとこいん',desc:'インターネット上で取引されるデジタルのお金（暗号資産）。ティッカーシンボルはBTC。ブロックチェーン技術で管理されており、上限発行枚数は2,100万枚。価格変動が非常に大きい。'},
  {name:'1株当たりキャッシュフロー',yomi:'ひとかぶあたりきゃっしゅふろー',desc:'企業が生み出したキャッシュフローを発行済み株式数で割った指標。1株あたりでどれだけ現金を稼ぐ力があるかを見る。'},
  {name:'評価額',yomi:'ひょうかがく',desc:'保有している資産を現在の価格で計算した金額。株や投資信託では時価ベースの現在価値を指す。'},
  {name:'評価損益',yomi:'ひょうかそんえき',desc:'保有中の資産の現在価格と買った価格との差額。プラスなら含み益、マイナスなら含み損。'},
  {name:'表面利回り',yomi:'ひょうめんりまわり',desc:'投資額に対して1年間で得られる収益の割合。主に不動産投資で使われ、年間家賃収入÷物件価格×100で計算することが多い。'},
  {name:'ファンダメンタルズ',yomi:'ふぁんだめんたるず',desc:'企業の業績・財務・事業内容や、景気・金利などの経済の基礎条件のこと。投資判断の土台になる情報を指す。'},
  {name:'ファンドマネージャー',yomi:'ふぁんどまねーじゃー',desc:'投資信託やファンドの運用を担当する専門家。どの資産や銘柄に投資するかを判断し、運用成績に大きく影響する。'},
  {name:'ファンドラップ',yomi:'ふぁんどらっぷ',desc:'資産配分や投資信託の選定・見直しを金融機関に一任できるサービス。手数料が年1〜2%以上かかることが多く、長期運用ではコスト負けしやすいため、初心者にはあまりおすすめしない。'},
  {name:'フィッシング',yomi:'ふぃっしんぐ',desc:'銀行や証券会社を装ったメールやサイトに誘導して、IDやパスワードを盗み取る詐欺のこと。本物そっくりでも、リンクを安易に開かないことが大切。'},
  {name:'VYM',yomi:'ぶいわいえむ',desc:'米国の高配当株を中心に約400社に分散投資するETF（バンガード社）。安定した配当収入を目的とした代表的な高配当ETF。'},
  {name:'含み益',yomi:'ふくみえき',desc:'まだ売っていない保有資産が、買った価格より値上がりしている状態の利益。売却して初めて実現益になる。'},
  {name:'含み損',yomi:'ふくみぞん',desc:'まだ売っていない保有資産が、買った価格より値下がりしている状態の損失。売却するまでは確定していない。'},
  {name:'複利',yomi:'ふくり',desc:'運用で得た利益を元本に組み入れて、さらにその合計に対して利益がつく仕組み。長期投資で効果が大きい。'},
  {name:'物価指数',yomi:'ぶっかしすう',desc:'物価の動きを数字で表した指標。消費者物価指数（CPI）などが代表的で、インフレやデフレの把握に使われる。'},
  {name:'ふるさと納税',yomi:'ふるさとのうぜい',desc:'応援したい自治体に寄付をすると、自己負担2,000円を除いた分が税金から差し引かれる制度のこと。返礼品がもらえる自治体も多く、節税と地域応援を兼ねた仕組みとして使われている。'},
  {name:'ブル・ベア',yomi:'ぶるべあ',desc:'相場の流れが強気か弱気かを表す言葉のこと。ブルは上昇しやすい相場、ベアは下落しやすい相場を指す。'},
  {name:'不労所得',yomi:'ふろうしょとく',desc:'働かなくても得られる収入のこと。配当金や家賃収入、利息などがあり、生活費の一部をまかなえる状態を目指す人が多い。'},
  {name:'分散投資',yomi:'ぶんさんとうし',desc:'株だけでなく債券や現金、国内だけでなく海外など、いろいろな資産や地域に分けて投資すること。1つに集中するより値動きの偏りを抑えやすい。'},
  {name:'分配金',yomi:'ぶんぱいきん',desc:'投資信託の運用で出た利益の一部を、保有している人に払い出すお金のこと。受け取ることもできるし、自動で再投資に回す設定にすることもできる。'},
  {name:'分配金再投資',yomi:'ぶんぱいきんさいとうし',desc:'投資信託の分配金を受け取らず、そのまま同じファンドに再投資するしくみ。'},
  {name:'分配利回り',yomi:'ぶんぱいりまわり',desc:'投資した金額や基準価額に対して、1年間でどれくらい分配金を受け取れるかを表す割合のこと。ただし見た目が高くても、元本を取り崩している場合があるので注意が必要。'},
  {name:'米国株',yomi:'べいこくかぶ',desc:'アメリカの証券取引所に上場している会社の株のこと。AppleやMicrosoftなど世界を代表する企業が多く、成長性の高さから人気がある。'},
  {name:'併用',yomi:'へいよう',desc:'新NISAで、つみたて投資枠と成長投資枠を同じ年に両方使えること。旧NISAではどちらか一方しか使えなかった。'},
  {name:'ヘッジファンド',yomi:'へっじふぁんど',desc:'主に富裕層や機関投資家向けにつくられた、積極的な運用を行うファンドのこと。高い利益を目指せる一方で、仕組みが複雑で手数料も高くなりやすい。'},
  {name:'ベンチマーク',yomi:'べんちまーく',desc:'運用成績を比べるときの基準になる指数や数字のこと。たとえばS&P500に連動するファンドなら、S&P500がベンチマークになる。'},
  {name:'変動金利',yomi:'へんどうきんり',desc:'市場の金利に合わせて見直される金利のこと。住宅ローンなどで使われることが多く、将来の返済額が増えたり減ったりする可能性がある。'},
  {name:'変動費',yomi:'へんどうひ',desc:'月ごとに金額が変わる支出のこと。食費・外食・娯楽費などがあり、意識や習慣でコントロールしていく必要がある。'},
  {name:'ポイント投資',yomi:'ぽいんととうし',desc:'楽天ポイントやVポイントなどのポイントを使って、投資信託や株を買うこと。少額から投資を始めやすく、投資の練習として使う人も多い。'},
  {name:'ポイント還元',yomi:'ぽいんとかんげん',desc:'クレジットカードやサービスを利用したときに、使った金額に応じてポイントが戻ってくる仕組みのこと。証券会社によっては積立投資でもポイントが貯まる。'},
  {name:'暴落',yomi:'ぼうらく',desc:'株価が短期間で大きく下がること。数日〜数週間で10〜20%以上下がるようなケースを指すことが多い。'},
  {name:'暴落対策',yomi:'ぼうらくたいさく',desc:'株価が大きく下がったときに慌てないための準備のこと。現金を確保しておく、分散投資をしておく、事前に売買ルールを決めておくなどが有効。'},
  {name:'ポートフォリオ',yomi:'ぽーとふぉりお',desc:'自分が持っている資産全体の組み合わせのこと。株、債券、現金などをどの割合で持っているかを見るときに使う。'},
  {name:'保険の見直し',yomi:'ほけんのみなおし',desc:'今入っている保険が自分や家族に本当に必要かを見直すこと。保障が重なっていたり不要な保険を減らせれば、固定費の削減につながる。'},
  {name:'ボラティリティ',yomi:'ぼらてぃりてぃ',desc:'価格の動きの大きさを表す言葉のこと。ボラティリティが高いほど値動きが大きく、利益も損失も出やすい。'},

  {name:'養老保険',yomi:'ようろうほけん',desc:'満期まで生きていれば満期保険金を受け取れ、途中で亡くなった場合は死亡保険金が支払われる保険のこと。保障と貯蓄の両方を兼ねるが、保険料は高めになりやすい。'},
  {name:'4%ルール',yomi:'よんぱーせんとるーる',desc:'毎年「資産の4%」を取り崩しても30年以上資産が持つ可能性が高いとされる考え方。アメリカの研究（トリニティスタディ）が元になっている。'},

  {name:'ライフプラン',yomi:'らいふぷらん',desc:'結婚・子育て・住宅購入・老後など、これからの人生で起こる大きな出来事を見すえて、どんな生活を送りたいかを考える計画のこと。'},

  {name:'利子所得',yomi:'りししょとく',desc:'預金や債券などから受け取る利子による所得のこと。通常は税金があらかじめ差し引かれて受け取る形になる。'},

  {name:'リスク許容度',yomi:'りすくきょようど',desc:'資産が値下がりしたときに、どこまでなら精神的・家計的に耐えられるかという度合いのこと。年齢や収入、家族構成、資産状況によって変わる。'},
  {name:'リスク資産',yomi:'りすくしさん',desc:'価格が大きく動き、元本が減る可能性がある資産のこと。株や投資信託、ETFなどが代表的で、増える可能性がある一方で下がることもある。'},
  {name:'利息',yomi:'りそく',desc:'お金を預けたり貸したりした対価として受け取るお金のこと。預金や債券などで受け取る収益の基本になる。'},
  {name:'リターン',yomi:'りたーん',desc:'投資によって得られた利益のこと。値上がり益だけでなく、配当金や利息なども含めて考える。'},
  {name:'リバランス',yomi:'りばらんす',desc:'値動きによって崩れた資産の割合を、もとの目標に戻すこと。たとえば株が増えすぎたら一部を売って、債券や現金とのバランスを整える。'},
  {name:'リボ払い',yomi:'りぼばらい',desc:'クレジットカードの支払い方法の一つで、使った金額をまとめて払わず、毎月ほぼ一定額ずつ返していく仕組みのこと。一見ラクに見えるが、手数料が高くなりやすく、支払いが長引く原因になるため絶対にやめましょう。'},
  {name:'利回り',yomi:'りまわり',desc:'投資した金額に対して、どれくらいの収益が得られたかを表す割合のこと。配当利回りや債券の利回りなど、収益性を見るときの基本になる。'},
  {name:'流動性',yomi:'りゅうどうせい',desc:'持っている資産を、どれくらいすぐ現金に換えられるかを表す度合いのこと。株は比較的換金しやすく、不動産は時間がかかりやすい。'},
  {name:'流動性リスク',yomi:'りゅうどうせいりすく',desc:'売りたいときにすぐ売れなかったり、思っていた価格で取引できなかったりするリスクのこと。'},
  {name:'累進課税',yomi:'るいしんかぜい',desc:'所得が多い人ほど高い税率がかかる仕組みのこと。日本の所得税はこの考え方で計算されている。'},
  {name:'累進配当',yomi:'るいしんはいとう',desc:'会社の利益が増えたときは配当を増やし、業績が少し悪くなってもできるだけ減配しないようにする配当方針のこと。株主への還元を大切にする姿勢として注目される。'},
  {name:'レバレッジ',yomi:'ればれっじ',desc:'借入や証拠金を使って、自分の元手より大きな金額を動かすこと。利益が大きくなる可能性がある一方で、損失も大きくなりやすい。'},
  {name:'連続増配',yomi:'れんぞくぞうはい',desc:'会社が配当金を毎年少しずつ増やし続けていること。長く連続増配している会社は、業績や財務が比較的安定している目安として見られることが多い。'},
  {name:'老後資金',yomi:'ろうごしきん',desc:'仕事を辞めたあとの生活に必要なお金のこと。年金だけで足りない部分を、貯蓄やNISA、iDeCoなどで早めに準備していくことが大切。'},
  {name:'老後2000万円問題',yomi:'ろうごにせんまんえんもんだい',desc:'老後に年金だけでは生活費が足りず、約2,000万円の備えが必要になる可能性があると話題になった問題のこと。老後資金づくりへの関心が高まるきっかけになった。'},
  {name:'老齢年金',yomi:'ろうれいねんきん',desc:'老後に受け取る公的年金のこと。国民年金の部分と、会社員や公務員なら厚生年金の部分を合わせて受け取る。'},
  {name:'ローソク足',yomi:'ろーそくあし',desc:'株価の動きを、始値・高値・安値・終値の4つで表すチャートの基本形。1本でその期間の値動きと勢いがわかる。'},
  {name:'ロールオーバー',yomi:'ろーるおーばー',desc:'旧NISAで、非課税期間が終わる資産を翌年の非課税枠に移し替えること。新NISAでは非課税期間が無期限なので不要になった。'},
  {name:'ロスカット',yomi:'ろすかっと',desc:'損失が一定以上に膨らんだときに、強制的または自動でポジションを決済する仕組み。主にFXや信用取引で使われるリスク管理手法。'},
  {name:'割高株',yomi:'わりだかかぶ',desc:'企業の利益や資産に対して株価が高いと考えられる株。成長期待で買われているケースも多く、PERが高い銘柄などが該当する。'},
  {name:'割安株',yomi:'わりやすかぶ',desc:'企業の本来の価値に対して株価が低いと考えられる株。PERやPBRが低いなどの指標で判断されることが多い。'}
];

const ROWS = [
  {label:'あ', chars:['あ','い','う','え','お']},
  {label:'か', chars:['か','き','く','け','こ','が','ぎ','ぐ','げ','ご']},
  {label:'さ', chars:['さ','し','す','せ','そ','ざ','じ','ず','ぜ','ぞ']},
  {label:'た', chars:['た','ち','つ','て','と','だ','ぢ','づ','で','ど']},
  {label:'な', chars:['な','に','ぬ','ね','の']},
  {label:'は', chars:['は','ひ','ふ','へ','ほ','ば','び','ぶ','べ','ぼ','ぱ','ぴ','ぷ','ぺ','ぽ']},
  {label:'ま', chars:['ま','み','む','め','も']},
  {label:'や', chars:['や','ゆ','よ']},
  {label:'ら', chars:['ら','り','る','れ','ろ']},
  {label:'わ', chars:['わ','を','ん']},
];

let currentRow = 'あ';

function getFirstKana(yomi) { return yomi.charAt(0); }

function rowHasTerms(rowLabel) {
  const row = ROWS.find(r => r.label === rowLabel);
  if (!row) return false;
  return TERMS.some(t => row.chars.includes(getFirstKana(t.yomi)));
}

function renderNav() {
  const nav = document.getElementById('kanaNav');
  nav.innerHTML = '';
  ROWS.forEach(row => {
    const btn = document.createElement('button');
    btn.className = 'kana-btn' + (row.label === currentRow ? ' active' : '') + (!rowHasTerms(row.label) ? ' disabled' : '');
    btn.textContent = row.label + '行';
    btn.onclick = () => {
      if (!rowHasTerms(row.label)) return;
      currentRow = row.label;
      document.getElementById('searchInput').value = '';
      renderNav();
      renderTerms();
    };
    nav.appendChild(btn);
  });
}

function renderTerms(terms) {
  const content = document.getElementById('mainContent');
  content.innerHTML = '';
  const row = ROWS.find(r => r.label === currentRow);
  const list = terms || TERMS.filter(t => row && row.chars.includes(getFirstKana(t.yomi)));
  list.sort((a, b) => a.yomi.localeCompare(b.yomi, 'ja'));

  if (list.length === 0) {
    content.innerHTML = '<div class="no-result">該当する用語が見つかりませんでした</div>';
    return;
  }

  const headerDiv = document.createElement('div');
  headerDiv.innerHTML = terms
    ? '<div class="search-result-label">' + list.length + '件見つかりました</div>'
    : '<div class="row-title">' + currentRow + '行の用語<span class="count-badge">' + list.length + '件</span></div>';
  content.appendChild(headerDiv);

  list.forEach(function(t) {
    const card = document.createElement('div');
    card.className = 'term-card';
    card.innerHTML =
      '<div class="term-header">'
      + '<div class="term-kana-badge">' + getFirstKana(t.yomi) + '</div>'
      + '<div style="flex:1"><div class="term-name">' + t.name + '</div>'
      + '<div class="term-yomi">' + t.yomi + '</div></div>'
      + '<div class="term-arrow">&#8250;</div>'
      + '</div>'
      + '<div class="term-body">' + t.desc + '</div>';
    card.addEventListener('click', function() { this.classList.toggle('open'); });
    content.appendChild(card);
  });
}

function toggleCard(el) {
  el.classList.toggle('open');
}

function onSearch() {
  const q = document.getElementById('searchInput').value.trim();
  document.getElementById('mainContent').innerHTML = '';
  if (!q) { renderTerms(); return; }
  const results = TERMS.filter(t =>
    t.name.includes(q) || t.yomi.includes(q) || t.desc.includes(q)
  );
  renderTerms(results);
}

renderNav();
renderTerms();
</script>
